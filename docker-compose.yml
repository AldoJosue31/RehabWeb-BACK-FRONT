services:
  db:
    image: mysql:8.4
    container_name: rehabweb_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./RehabWeb-Api
    container_name: rehabweb_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./RehabWeb-Api:/app

  frontend:
    build:
      context: ./RehabWeb-WebApp
    container_name: rehabweb_frontend
    restart: unless-stopped
    environment:
      NG_ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - backend
    ports:
      - "4201:4200"
    volumes:
      - ./RehabWeb-WebApp:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mysql_data:
  frontend_node_modules:
